apiVersion: apps/v1
kind: Deployment
metadata:
  name: beyondlog-api-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: beyondlog-api
  template:
    metadata:
      labels:
        app: beyondlog-api
    spec:
      containers:
      - name: beyondlog-api
        image: godbyul/beyondlog-api:20
        resources:
          requests:
            memory: "128Mi"
            cpu: "500m"
          limits:
            memory: "256Mi"
            cpu: "1000m"
        ports:
        - containerPort: 8088
        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8088
          failureThreshold: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8088
          initialDelaySeconds: 10
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8088
          initialDelaySeconds: 5
          periodSeconds: 5